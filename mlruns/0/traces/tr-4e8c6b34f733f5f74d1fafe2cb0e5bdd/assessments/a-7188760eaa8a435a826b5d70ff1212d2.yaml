      in stable geology but was not suitable for this project due to varied geology
      and alignment constraints.\\\\n*   **New Austrian Tunneling Methodology (NATM):**
      A construction method for tunnels that uses the surrounding rock mass itself
      for support. It involves a flexible support system and continuous monitoring,
      adapting to changing geological conditions. Often referred to as a \\\\\"brilliant
      blast method.\\\\\"\\\\n*   **Cross-section:** The shape and size of a tunnel
      when viewed as if cut by a plane perpendicular to its length. Larger cross-sections
      allow for more capacity or larger vehicles.\\\\n*   **Geology:** The study of
      the Earth\\'s physical structure and substance, its history, and the processes
      that act on it. In construction, understanding the local geology is crucial
      for stability and design.\\\\n*   **Geological disturbance:** Irregularities
      or weaknesses in the rock strata that can pose challenges during excavation.\\\\n*
